interface:
  display_name: "Workbench CLI"
  short_description: "Create evals, configure, run, inspect, compare, improve, and export Workbench projects with workbench"
  default_prompt: "Use the Workbench CLI as the cloud-first Workbench interface. Verify workbench is installed before using it; if it is missing, install @workbench-ai/workbench-cli and stop cleanly if npm lacks registry access for the @workbench-ai scope. Run Workbench project commands from the source directory containing workbench.yaml or pass --dir DIR. For hosted projects authenticate with workbench login through the Workbench web portal, use WORKBENCH_API_URL only to override the server URL, create or update a hosted project with workbench push, and prefer workbench init --skill when the candidate type is unclear. The candidate is the mutable thing Workbench improves; evals live in tasks, run, and grade. Default to rubric grading for qualitative scoring; use command grading only for objective deterministic checks, an existing scorer, or an explicitly requested programmatic grading contract. Runtime Dockerfiles own task tools and should include ca-certificates when HTTPS tools are needed; adapter setup owns adapter CLI dependencies. Author eval specs from existing workflows or file-output tasks using references/docs/evals, push local source with workbench push, run hosted improve/eval/compare workflows, inspect candidates, preview files, and pull selected candidates. Public projects are addressable as username/project; use workbench clone, publish, star, unstar, fork, and contribute for public benchmark collaboration. Hosted billing may require positive Workbench credit; new hosted billing accounts receive a $5 credit grant, users add more prepaid credit through Stripe top-ups, users still pay model or harness providers through adapter auth, and Workbench bills only its hosted execution service fee for completed hosted jobs under the configured billing formula. Hosted commands return or print Workbench Web URLs; use their urls object first, and when an embedded browser is available navigate it to the relevant Workbench URL so the user can see it. Use workbench open --json --no-open to resolve project/run/candidate/comparison ids later, workbench runs show for run detail, and workbench runs cancel to stop a running hosted workflow. Watched hosted commands are client-side polling only; stopping them does not cancel hosted runs. Use workbench dev only for explicit local development. Dev runs finish and exit; text output prints an Open local view command and lifecycle note, JSON output returns localView.command and localView.note, and workbench dev open --json --no-open starts the read-only local view and must keep running while that view is in use."
