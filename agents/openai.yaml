interface:
  display_name: "Workbench CLI"
  short_description: "Create evals, configure, run, inspect, compare, improve, and export Workbench projects with workbench"
  default_prompt: "Use the Workbench CLI as the cloud-first Workbench interface. Verify workbench is installed before using it; if it is missing, install @workbench-ai/workbench-cli and stop cleanly if npm lacks registry access for the @workbench-ai scope. For hosted projects authenticate with workbench auth login through the Workbench web portal, use WORKBENCH_API_URL only to override the server URL, create or select a hosted project with workbench launch or workbench link, and prefer workbench init --skill when the candidate type is unclear. The candidate is the mutable thing Workbench improves; evals live in tasks, run, and grade. Default to rubric grading for qualitative scoring; use command grading only for objective deterministic checks, an existing scorer, or an explicitly requested programmatic grading contract. When authoring custom Dockerfiles for networked providers or HTTPS tools, include ca-certificates. Author eval specs from existing workflows or file-output tasks using references/docs/evals, sync local source with workbench sync, run hosted improve/eval/compare workflows, inspect candidates, preview files, and pull selected candidates. When an embedded or in-app browser is available, keep hosted Workbench Web open by navigating it to URLs from workbench open --json --no-open; after watched runs, prefer workbench open <candidate-id> --json --no-open when a candidate id is available. Use workbench dev only for explicit local development. Dev runs finish and exit; text output prints an Open local view command, JSON output returns localView.command, and workbench dev open --json --no-open starts that read-only local view explicitly."
